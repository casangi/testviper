/* Fetch the most recently CI-active branches for a given repo.
   Queries /actions/runs?per_page=30, collects distinct head_branch values,
   excludes "main", and returns up to 2.  Returns [] on any error so the
   dropdown simply shows "main" alone without breaking the page.          */
async function fetchRecentBranches(owner, repo) {
  try {
    const r = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/actions/runs?per_page=30`,
      { headers: { 'Accept': 'application/vnd.github+json' } }
    );
    if (!r.ok) return [];
    const data = await r.json();
    const seen     = new Set();
    const branches = [];
    for (const run of (data.workflow_runs || [])) {
      const b = run.head_branch;
      if (b && b !== 'main' && !seen.has(b)) {
        seen.add(b);
        branches.push(b);
        if (branches.length >= 2) break;
      }
    }
    return branches;
  } catch {
    return [];
  }
}

/* Fetch the latest workflow run for one {owner}/{repo}/{file} on {branch}
   and update the four DOM elements passed in (dot colour, status text,
   branch label, relative timestamp).                                      */
function fetchWorkflowRow(owner, repo, file, branch, dotEl, statusEl, branchEl, timeEl) {
  branchEl.textContent     = branch;
  dotEl.style.background   = 'var(--border)';
  statusEl.textContent     = 'Fetching\u2026';
  statusEl.style.color     = '';
  timeEl.textContent       = '';

  fetch(
    `https://api.github.com/repos/${owner}/${repo}/actions/workflows/${file}/runs` +
    `?branch=${encodeURIComponent(branch)}&per_page=1`,
    { headers: { 'Accept': 'application/vnd.github+json' } }
  )
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      const run = (data.workflow_runs || [])[0];
      if (run) {
        const [color, label] = CI_CONCLUSION_MAP[run.conclusion]
          || ['#7a8ba8', run.conclusion || run.status || 'unknown'];
        dotEl.style.background = color;
        statusEl.textContent   = label;
        statusEl.style.color   = color;
        timeEl.textContent     = relTime(new Date(run.updated_at));
      } else {
        statusEl.textContent = 'no runs found';
      }
    })
    .catch(err => {
      dotEl.style.background = 'var(--border)';
      statusEl.textContent   = 'unavailable (' + err.message + ')';
    });
}

/* Re-fetch all workflow rows for one project when its branch dropdown changes.
   Locates each row inside tbody by the data-wf attribute set during build. */
function refreshProjectRows(tbody, owner, repo, workflows, branch) {
  workflows.forEach(wf => {
    const row = tbody.querySelector(`tr[data-wf="${wf.file}"]`);
    if (!row) return;
    const dotEl    = row.querySelector('.ci-ov-dot');
    const statusEl = row.querySelector('.ci-ov-status');
    const branchEl = row.querySelector('.ci-ov-branch');
    const timeEl   = row.querySelector('.ci-ov-time');
    fetchWorkflowRow(owner, repo, wf.file, branch, dotEl, statusEl, branchEl, timeEl);
  });
}

/* Resize a branch <select> to fit its currently selected option text.
   Uses a hidden <span> to measure the rendered text width at the same font
   and size as the select, then applies that as an explicit pixel width.
   Called after the initial "main" option is created, after async branch
   discovery adds options, and on every change event.                      */
function resizeBranchSelect(sel) {
  const tmp = document.createElement('span');
  tmp.style.cssText =
    'visibility:hidden;position:fixed;white-space:nowrap;' +
    'font-family:monospace;font-size:11px;padding:0 22px 0 8px;';
  tmp.textContent = sel.options[sel.selectedIndex]?.text || 'main';
  document.body.appendChild(tmp);
  sel.style.width = tmp.offsetWidth + 'px';
  document.body.removeChild(tmp);
}

/* Build the CI overview table inside #ci-overview.
   Called once from init().  For projects with fixedBranch=false an async
   branch-discovery fetch is kicked off; the dropdown is populated when it
   resolves, without blocking the initial "main" status fetches.           */
function buildCIOverview() {
  const container = document.getElementById('ci-overview');
  container.innerHTML = '';

  /* SVG external-link icon reused in every project header row */
  const extSvg =
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" ` +
    `style="width:11px;height:11px;flex-shrink:0">` +
    `<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>` +
    `<polyline points="15,3 21,3 21,9"/>` +
    `<line x1="10" y1="14" x2="21" y2="3"/>` +
    `</svg>`;

  const table = document.createElement('table');
  table.className = 'ci-ov-table';

  /* Column headers */
  const thead = document.createElement('thead');
  thead.innerHTML =
    `<tr>` +
    `<th style="width:28px"></th>` +       /* dot */
    `<th>CI Job Description</th>` +        /* workflow label */
    `<th style="width:110px">Branch</th>` +
    `<th style="width:110px">Status</th>` +
    `<th style="width:120px">Last Run</th>` +
    `</tr>`;
  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  CI_OVERVIEW_PROJECTS.forEach(cfg => {
    /* Match to the PROJECTS config to get owner/repo/actionsUrl */
    const proj  = PROJECTS.find(p => p.id.trim() === cfg.id);
    if (!proj) return;
    const ciCat = proj.categories.find(c => c.type === 'ci');
    if (!ciCat || !ciCat.github) return;
    const { owner, repo } = ciCat.github;
    const actionsUrl      = ciCat.url;

    /* ── Project header row ───────────────────────────────────────── */
    const projRow  = document.createElement('tr');
    projRow.className = 'ci-ov-proj-row';
    const projCell = document.createElement('td');
    projCell.colSpan = 5;

    const inner = document.createElement('div');
    inner.className = 'ci-ov-proj-inner';

    /* Project name */
    const nameSpan       = document.createElement('span');
    nameSpan.className   = 'ci-ov-proj-name';
    nameSpan.textContent = proj.name;
    inner.appendChild(nameSpan);

    /* Branch dropdown — only for projects where fixedBranch is false */
    let selectEl = null;
    if (!cfg.fixedBranch) {
      selectEl = document.createElement('select');
      selectEl.className = 'ci-ov-branch-select';
      selectEl.title     = 'Select branch';

      const mainOpt       = document.createElement('option');
      mainOpt.value       = 'main';
      mainOpt.textContent = 'main';
      selectEl.appendChild(mainOpt);

      /* Size to "main" immediately — will re-size after branch discovery too */
      requestAnimationFrame(() => resizeBranchSelect(selectEl));

      /* Async: discover recently active branches and add them to the dropdown */
      fetchRecentBranches(owner, repo).then(branches => {
        branches.forEach(b => {
          const opt       = document.createElement('option');
          opt.value       = b;
          opt.textContent = b;
          selectEl.appendChild(opt);
        });
        /* Selection is still "main" after discovery — keep the compact size */
        resizeBranchSelect(selectEl);
      });

      /* Branch change → resize to selected text, then re-fetch rows */
      selectEl.addEventListener('change', () => {
        resizeBranchSelect(selectEl);
        refreshProjectRows(tbody, owner, repo, cfg.workflows, selectEl.value);
      });

      inner.appendChild(selectEl);
    }

    /* "Open in GitHub ↗" link */
    const openLink     = document.createElement('a');
    openLink.className = 'ci-ov-open-link';
    openLink.href      = actionsUrl;
    openLink.target    = '_blank';
    openLink.rel       = 'noopener noreferrer';
    openLink.innerHTML = extSvg + '&nbsp;Open in GitHub';
    inner.appendChild(openLink);

    projCell.appendChild(inner);
    projRow.appendChild(projCell);
    tbody.appendChild(projRow);

    /* ── Workflow data rows ───────────────────────────────────────── */
    cfg.workflows.forEach(wf => {
      const row       = document.createElement('tr');
      row.className   = 'ci-ov-wf-row';
      row.dataset.wf  = wf.file;   /* used by refreshProjectRows() */

      /* Dot cell */
      const dotTd  = document.createElement('td');
      dotTd.className = 'ci-ov-dot-cell';
      const dot    = document.createElement('span');
      dot.className   = 'ci-ov-dot';
      dotTd.appendChild(dot);

      /* Label cell */
      const labelTd       = document.createElement('td');
      labelTd.textContent = wf.label;

      /* Branch cell */
      const branchTd      = document.createElement('td');
      const branchSpan    = document.createElement('span');
      branchSpan.className   = 'ci-ov-branch';
      branchSpan.textContent = 'main';
      branchTd.appendChild(branchSpan);

      /* Status cell */
      const statusTd      = document.createElement('td');
      const statusSpan    = document.createElement('span');
      statusSpan.className   = 'ci-ov-status';
      statusSpan.textContent = 'Fetching\u2026';
      statusTd.appendChild(statusSpan);

      /* Time cell */
      const timeTd     = document.createElement('td');
      const timeSpan   = document.createElement('span');
      timeSpan.className = 'ci-ov-time';
      timeTd.appendChild(timeSpan);

      row.appendChild(dotTd);
      row.appendChild(labelTd);
      row.appendChild(branchTd);
      row.appendChild(statusTd);
      row.appendChild(timeTd);
      tbody.appendChild(row);

      /* Start fetching immediately for "main" */
      fetchWorkflowRow(owner, repo, wf.file, 'main', dot, statusSpan, branchSpan, timeSpan);
    });
  });

  table.appendChild(tbody);
  container.appendChild(table);
}

/* Navigate to the landing page.
   Clears the URL hash, deactivates all project/category tabs, resets the
   category bar to its empty/dimmed state, and shows the landing panel. */
function goHome() {
  /* Clear URL hash without adding a history entry */
  history.replaceState(null, '', window.location.pathname);

  /* Reset state */
  activeProject  = null;
  activeCategory = null;

  /* Hide the loader in case it was spinning when the user clicked home */
  document.getElementById('loader').classList.add('hidden');

  /* Deactivate all project tabs */
  document.querySelectorAll('.proj-tab').forEach(t => t.classList.remove('active'));

  /* Reset category bar to empty state */
  document.getElementById('cat-label').textContent = '—';
  document.getElementById('cat-tabs').innerHTML    = '';
  document.getElementById('catbar').classList.add('empty');

  showPanel('landing');
}

/* ══════════════════════════════════════════════════════════════════════════
   PANEL VISIBILITY
   ─────────────────────────────────────────────────────────────────────────
   Only one content panel should be visible at a time. showPanel() hides all
   panels then shows the requested one.

   Panel IDs: 'landing' | 'frame' | 'launch-panel'
   (The loader overlay is handled separately since it can appear over any panel)
══════════════════════════════════════════════════════════════════════════ */

function showPanel(name) {
  /* Hide everything */
  document.getElementById('landing').style.display          = 'none';
  document.getElementById('main-frame').style.display       = 'none';
  document.getElementById('launch-panel').style.display     = 'none';
  document.getElementById('coverage-panel').style.display   = 'none';
  document.getElementById('ci-panel').style.display         = 'none';

  /* Show the requested panel */
  if (name === 'landing') {
    document.getElementById('landing').style.display = 'flex';
  } else if (name === 'frame') {
    document.getElementById('main-frame').style.display = 'block';
  } else if (name === 'launch-panel') {
    document.getElementById('launch-panel').style.display = 'flex';
  } else if (name === 'coverage-panel') {
    document.getElementById('coverage-panel').style.display = 'flex';
  } else if (name === 'ci-panel') {
    document.getElementById('ci-panel').style.display = 'flex';
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   THEME SWITCHER
══════════════════════════════════════════════════════════════════════════ */

/* Apply a theme by name. Persists choice to localStorage. */
function setTheme(name) {
  /* Apply theme to the root element — all CSS variables update automatically */
  document.documentElement.dataset.theme = name;

  /* Persist so the same theme is used on next visit */
  localStorage.setItem('dashboard-theme', name);

  /* Update the button label */
  document.getElementById('theme-label').textContent = THEME_LABELS[name] || name;

  /* Mark the active option in the menu */
  document.querySelectorAll('.theme-option').forEach(el => {
    el.classList.toggle('active', el.dataset.theme === name);
  });

  /* Close the dropdown */
  document.getElementById('theme-menu').classList.remove('open');
}

/* Toggle the theme dropdown and position it below the button.
   The menu uses position:fixed with coordinates derived from the button's
   bounding rect — this avoids clipping by #projbar's overflow:auto.     */
function toggleThemeMenu() {
  const menu   = document.getElementById('theme-menu');
  const btn    = document.getElementById('theme-btn');
  const rect   = btn.getBoundingClientRect();
  const isOpen = menu.classList.contains('open');

  menu.classList.toggle('open');

  if (!isOpen) {
    /* Align bottom of button → top of menu, right-edge-aligned */
    menu.style.top   = (rect.bottom + 4) + 'px';
    menu.style.right = (window.innerWidth - rect.right) + 'px';
    menu.style.left  = 'auto';
  }
}

/* Close the theme menu when clicking anywhere outside it */
document.addEventListener('click', e => {
  const btn  = document.getElementById('theme-btn');
  const menu = document.getElementById('theme-menu');
  if (!btn.contains(e.target) && !menu.contains(e.target)) {
    menu.classList.remove('open');
  }
});

/* Read saved theme from localStorage (falls back to DEFAULT_THEME) */
function initTheme() {
  setTheme(localStorage.getItem('dashboard-theme') || DEFAULT_THEME);
}

/* ══════════════════════════════════════════════════════════════════════════
   PROJECT & CATEGORY TAB BUILDING
══════════════════════════════════════════════════════════════════════════ */

/* Create one .proj-tab element per project and append them to #proj-tabs. */
function buildProjectTabs() {
  const projTabs = document.getElementById('proj-tabs');
  projTabs.innerHTML = ''; /* clear on rebuild */

  PROJECTS.forEach(p => {
    const t = document.createElement('div');
    t.className      = 'proj-tab';
    t.dataset.id     = p.id;
    t.textContent    = p.name;
    t.title          = `Open ${p.name} project`;
    t.addEventListener('click', () => selectProject(p.id));
    projTabs.appendChild(t);
  });
}

/* ── selectProject ───────────────────────────────────────────────────────
   Called when a project tab or landing card is clicked.
   - Marks the clicked project tab as active
   - Rebuilds the category bar for the new project
   - Selects the first category (or a specific one if catId is provided)
   ─────────────────────────────────────────────────────────────────────── */
function selectProject(projId, catId) {
  const p = PROJECTS.find(x => x.id === projId);
  if (!p) return;
  activeProject = p;

  /* Activate the matching project tab */
  document.querySelectorAll('.proj-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.id === projId);
  });

  /* Rebuild category bar */
  const catTabs  = document.getElementById('cat-tabs');
  const catLabel = document.getElementById('cat-label');
  catTabs.innerHTML    = '';
  catLabel.textContent = p.name;
  document.getElementById('catbar').classList.remove('empty');

  p.categories.forEach(cat => {
    /* Inject class="cat-icon" into the icon SVG string */
    const iconHtml = (ICONS[cat.type] || ICONS.custom)
                       .replace('<svg ', '<svg class="cat-icon" ');

    const t = document.createElement('div');
    t.className    = 'cat-tab';
    t.dataset.id   = cat.id;
    t.dataset.type = cat.type;

    let labelHtml;
    if (cat.type === 'repo') {
      /* "Repo" category: clickable label that opens in a new tab, with an inline external icon */
      labelHtml =
        `<a href="${cat.url}" target="_blank" rel="noopener noreferrer" ` +
        `class="cat-repo-link" title="Open in a new tab">` +
        `${cat.label}<span class="cat-repo-external" aria-hidden="true">&#x2197;</span></a>`;
      t.title = 'Open repository in a new tab';
    } else {
      labelHtml = cat.label;
      t.title   = cat.label;
    }

    t.innerHTML = iconHtml + labelHtml;
    t.addEventListener('click', (event) => {
      if (cat.type === 'repo') {
        /* Prevent the inner <a> default navigation; routing logic below will open the tab. */
        event.preventDefault();
      }
      selectCategory(projId, cat.id);
    });
    catTabs.appendChild(t);
  });

  /* Select the specified category, or default to the first one */
  const defaultCat = catId || p.categories[0]?.id;
  if (defaultCat) selectCategory(projId, defaultCat);
}

/* ── selectCategory ──────────────────────────────────────────────────────
   Called when a category tab is clicked, or by selectProject().
   - Marks the clicked category tab as active
   - Updates the URL hash for bookmarking
   - Decides whether to show the iframe or the launch panel
   ─────────────────────────────────────────────────────────────────────── */
function selectCategory(projId, catId) {
  const p   = PROJECTS.find(x => x.id === projId);
  const cat = p?.categories.find(c => c.id === catId);
  if (!p || !cat) return;
  activeCategory = cat;

  /* Highlight the active category tab */
  document.querySelectorAll('.cat-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.id === catId);
  });

  /* Update the URL hash so the view is bookmarkable.
     Format: #projectId/categoryId  e.g. #xradio/report           */
  history.replaceState(null, '', `#${projId}/${catId}`);

  /* Route to the appropriate panel or behaviour */
  if (cat.type === 'ci') {
    showCIPanel(cat);
  } else if (cat.type === 'coverage') {
    showCoveragePanel(cat);
  } else if (cat.type === 'repo') {
    /* Repo tabs open the repository URL directly in a new browser tab and
       leave the existing centre panel content unchanged. */
    if (cat.url) {
      const win = window.open(cat.url, '_blank');
      if (win) {
        /* Ensure no access back to this window in supporting browsers. */
        win.opener = null;
      }
    }
  } else if (shouldUseLaunchPanel(cat)) {
    showLaunchPanel(cat);
  } else {
    loadUrl(cat.url);
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   EMBEDDABILITY CHECK
   ─────────────────────────────────────────────────────────────────────────
   Returns true if this category should show the launch panel instead of
   loading in an iframe.
   Two rules are checked:
     1. The category's `type` is in LAUNCH_PANEL_TYPES (e.g. "repo")
     2. The URL's hostname matches an entry in LAUNCH_PANEL_URLS
══════════════════════════════════════════════════════════════════════════ */
function shouldUseLaunchPanel(cat) {
  /* Rule 1: type-based block */
  if (LAUNCH_PANEL_TYPES.includes(cat.type)) return true;

  /* Rule 2: hostname-based block */
  try {
    const host = new URL(cat.url).hostname;
    return LAUNCH_PANEL_URLS.some(h => host === h || host.endsWith('.' + h));
  } catch (e) {
    return false; /* malformed URL — try to embed anyway */
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   LAUNCH PANEL
   ─────────────────────────────────────────────────────────────────────────
   Populates the launch panel with the category's details and shows it.
   Called when shouldUseLaunchPanel() returns true.
══════════════════════════════════════════════════════════════════════════ */
function showLaunchPanel(cat) {
  document.getElementById('loader').classList.add('hidden');
  showPanel('launch-panel');

  const color  = TYPE_COLORS[cat.type] || TYPE_COLORS.custom;
  const icon   = (ICONS[cat.type] || ICONS.custom);
  const reason = LAUNCH_REASONS[cat.type] || LAUNCH_REASONS.default;

  /* Inject the icon with explicit size and colour attributes */
  document.getElementById('launch-icon').innerHTML =
    icon.replace('<svg ', `<svg width="28" height="28" stroke="${color}" `);

  document.getElementById('launch-title').textContent  = cat.label;
  document.getElementById('launch-url').textContent    = cat.url;
  document.getElementById('launch-reason').textContent = reason;
  document.getElementById('launch-btn').href           = cat.url;
  document.getElementById('launch-note').textContent   = 'Opens in a new tab';
}

/* ══════════════════════════════════════════════════════════════════════════
   COVERAGE PANEL  —  showCoveragePanel(cat)
   ─────────────────────────────────────────────────────────────────────────
   Renders a live summary card for categories with type "coverage".
   Never uses an iframe — always shows the in-page card.

   Codecov API  (repo endpoint — NOT the commits sub-endpoint):
     GET https://api.codecov.io/api/v2/{service}/{owner}/repos/{repo}/
     Reads:  data.totals.{ coverage, lines, hits, misses, partials }
             data.branch        — default branch name
             data.updatestamp   — ISO timestamp of last coverage upload
     NOTE: The /commits/ sub-endpoint was deliberately avoided. It returns
           per-upload partial totals, which give wrong line counts when a
           repo uploads coverage in multiple flags or CI steps. The repo
           endpoint returns the merged, authoritative totals (same as the
           Codecov dashboard badge).

   GitHub Actions API  (optional — for the CI status row):
     GET https://api.github.com/repos/{owner}/{repo}/actions/runs?per_page=5
     Picks the most-recent completed run; shows its name and conclusion.
     NOTE: This call is made directly from the browser without authentication
           and is therefore subject to GitHub’s unauthenticated rate limit
           (currently 60 requests/hour per IP). Hitting that limit will cause
           HTTP 403 responses even though the runs are visible in the GitHub UI.

   Required fields on the category object:
     codecov: { service, owner, repo }   — drives the Codecov fetch
     github:  { owner, repo }            — optional, drives CI status
══════════════════════════════════════════════════════════════════════════ */
function showCoveragePanel(cat) {
  document.getElementById('loader').classList.add('hidden');
  showPanel('coverage-panel');

  /* Reset all shimmer placeholders */
  const pctEl = document.getElementById('cov-pct');
  pctEl.innerHTML = '&nbsp;';
  pctEl.style.color = '';
  pctEl.style.minWidth  = '52px';
  pctEl.style.minHeight = '26px';
  pctEl.classList.add('shimmer');
  document.getElementById('cov-circle').style.borderColor = '';

  ['cov-name', 'cov-branch', 'cov-updated'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '&nbsp;';
    el.classList.add('shimmer');
  });
  ['cov-lines', 'cov-hits', 'cov-misses', 'cov-parts'].forEach(id => {
    document.getElementById(id).textContent = '\u2014';
  });

  document.getElementById('cov-ci-dot').style.background = 'var(--border)';
  document.getElementById('cov-ci-text').textContent     = 'Fetching CI status\u2026';
  document.getElementById('cov-ci-time').textContent     = '';
  document.getElementById('cov-ci').style.display        = '';
  document.getElementById('cov-error').style.display     = 'none';
  document.getElementById('cov-open').href               = cat.url;

  /* ── Codecov API ────────────────────────────────────────────────────── */
  if (cat.codecov) {
    const cc = cat.codecov;
    // Repo endpoint — authoritative merged totals for the default branch.
    // See the COVERAGE PANEL block comment above for why /commits/ is not used.
    const apiUrl = `https://api.codecov.io/api/v2/${cc.service}/${cc.owner}/repos/${cc.repo}/`;

    fetch(apiUrl)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(data => {
        const totals = data.totals;

        if (totals) {
          const pct   = parseFloat(totals.coverage);
          const color = pct >= 80 ? '#4ade80' : pct >= 60 ? '#fbbf24' : '#f87171';
          pctEl.textContent     = isNaN(pct) ? '\u2014' : pct.toFixed(1) + '%';
          pctEl.style.color     = color;
          pctEl.style.minWidth  = '';
          pctEl.style.minHeight = '';
          pctEl.classList.remove('shimmer');
          document.getElementById('cov-circle').style.borderColor = color;

          document.getElementById('cov-lines').textContent  = totals.lines    != null ? totals.lines    : '\u2014';
          document.getElementById('cov-hits').textContent   = totals.hits     != null ? totals.hits     : '\u2014';
          document.getElementById('cov-misses').textContent = totals.misses   != null ? totals.misses   : '\u2014';
          document.getElementById('cov-parts').textContent  = totals.partials != null ? totals.partials : '\u2014';
        }

        clearShimmer('cov-name',    cc.owner + ' / ' + cc.repo);
        clearShimmer('cov-branch',  'branch: ' + (data.branch || 'main'));
        clearShimmer('cov-updated', data.updatestamp
          ? 'Updated ' + relTime(new Date(data.updatestamp)) : '');
      })
      .catch(err => {
        pctEl.textContent     = '\u2014';
        pctEl.style.minWidth  = '';
        pctEl.style.minHeight = '';
        pctEl.classList.remove('shimmer');
        clearShimmer('cov-name',    cc.owner + ' / ' + cc.repo);
        clearShimmer('cov-branch',  '');
        clearShimmer('cov-updated', '');
        const errEl = document.getElementById('cov-error');
        errEl.style.display = 'block';
        errEl.textContent   = 'Could not load Codecov data (' + err.message + '). Use the button below to view directly.';
      });
  }

  /* ── GitHub Actions API (CI status) ─────────────────────────────────── */
  if (cat.github) {
    const gh = cat.github;
    fetch(`https://api.github.com/repos/${gh.owner}/${gh.repo}/actions/runs?per_page=5`,
          { headers: { 'Accept': 'application/vnd.github+json' } })
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(data => {
        const runs = data.workflow_runs || [];
        const run  = runs.find(r => r.status === 'completed') || runs[0];
        if (run) {
          const map = {
            success:    ['#4ade80', 'passing'],
            failure:    ['#f87171', 'failing'],
            cancelled:  ['#fbbf24', 'cancelled'],
            timed_out:  ['#f87171', 'timed out'],
          };
          const [color, label] = map[run.conclusion] || ['#7a8ba8', run.conclusion || run.status || 'unknown'];
          document.getElementById('cov-ci-dot').style.background = color;
          document.getElementById('cov-ci-text').textContent = 'CI: ' + (run.name || 'Workflow') + ' \u2014 ' + label;
          document.getElementById('cov-ci-time').textContent = relTime(new Date(run.updated_at));
        } else {
          document.getElementById('cov-ci-text').textContent = 'No CI runs found';
        }
      })
      .catch(() => {
        document.getElementById('cov-ci-dot').style.background = 'var(--border)';
        document.getElementById('cov-ci-text').textContent = 'CI status unavailable';
      });
  } else {
    document.getElementById('cov-ci').style.display = 'none';
  }
}

/* Remove shimmer from an element and set its text content */
function clearShimmer(id, text) {
  const el = document.getElementById(id);
  el.classList.remove('shimmer');
  el.style.minWidth  = '';
  el.style.minHeight = '';
  el.textContent = text;
}

/* Human-readable relative time: "5m ago", "2h ago", "3d ago" */
function relTime(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 60)    return s + 's ago';
  if (s < 3600)  return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

/* ══════════════════════════════════════════════════════════════════════════
   IFRAME LOADER
   ─────────────────────────────────────────────────────────────────────────
   Sets the iframe src and shows the loading spinner while it loads.
   After load, a brief check detects if the frame is empty (a sign of a
   silent block) and falls back to the launch panel.
══════════════════════════════════════════════════════════════════════════ */
function loadUrl(url) {
  const frame  = document.getElementById('main-frame');
  const loader = document.getElementById('loader');

  showPanel(null);               /* hide all content panels */
  loader.classList.remove('hidden'); /* show spinner */

  frame.onload = () => {
    loader.classList.add('hidden');
    showPanel('frame');

    /* Silent block detection: some browsers render a blank document instead
       of showing an error when X-Frame-Options blocks the content.
       If the body is empty 600ms after load, fall back to the launch panel. */
    setTimeout(() => {
      try {
        const doc = frame.contentDocument;
        if (doc && doc.body && doc.body.innerHTML.trim() === '') {
          showLaunchPanel(activeCategory);
        }
      } catch (e) {
        /* A cross-origin security error is the EXPECTED case for successfully
           loaded cross-origin pages — it means the iframe loaded fine.       */
      }
    }, 600);
  };

  frame.src = url;
}

/* ── openFull ────────────────────────────────────────────────────────────
   Opens the currently active category URL directly in a new browser tab.
   Useful for getting a shareable link or for pages that don't embed. */
function openFull() {
  if (activeCategory) window.open(activeCategory.url, '_blank');
}

/* ══════════════════════════════════════════════════════════════════════════
   URL HASH ROUTING
   ─────────────────────────────────────────────────────────────────────────
   On page load, reads the URL hash to restore the last-viewed state.
   Formats:
     (empty)            → show landing page
     #projectId         → select project, show its first category
     #projectId/catId   → select project and specific category
══════════════════════════════════════════════════════════════════════════ */
function loadFromHash() {
  const hash = location.hash.slice(1); /* remove leading '#' */

  if (!hash) {
    /* No hash → show landing page */
    showPanel('landing');
    return;
  }

  const [projId, catId] = hash.split('/');

  if (projId) {
    selectProject(projId, catId || undefined);
  } else {
    showPanel('landing');
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   INITIALISATION
   ─────────────────────────────────────────────────────────────────────────
   Called once when the page loads. Order matters:
   1. Apply saved theme immediately (avoids flash of wrong theme)
   2. Set the landing page title text
   3. Build the project tabs in the navbar
   4. Build the CI overview table and start fetching live status (v2)
   5. Restore state from URL hash (may replace the landing page view)
══════════════════════════════════════════════════════════════════════════ */
/* ══════════════════════════════════════════════════════════════════════════
   CI PANEL  —  showCIPanel(cat)
   ─────────────────────────────────────────────────────────────────────────
   Renders a live CI status card for any category with type "ci".
   One fetch per workflow file — uses the specific per-file endpoint which
   works without auth for public repos. The general /actions/runs and
   /actions/workflows list endpoints both return 403 without a token.

   IMPORTANT: All of these requests are also subject to GitHub’s
   unauthenticated rate limit (currently 60 requests/hour per IP). If that
   limit is exceeded, the Responses will be HTTP 403 (rate limit exceeded)
   even though the workflows are accessible in the GitHub UI.

     GET /repos/{owner}/{repo}/actions/workflows/{file}/runs?per_page=1

   Workflow files are listed explicitly in each CI category's `workflows` array
   in the PROJECTS config. This is the same approach that worked originally for
   testviper before the dynamic-discovery attempt introduced the 403 errors.

   Required fields on the category object:
     github: { owner, repo }   — drives all fetches
══════════════════════════════════════════════════════════════════════════ */
function showCIPanel(cat) {
  document.getElementById('loader').classList.add('hidden');
  showPanel('ci-panel');

  if (!cat.github) return;
  const { owner, repo } = cat.github;

  const nameEl  = document.getElementById('ci-repo-name');
  const rowsEl  = document.getElementById('ci-rows');
  const openEl  = document.getElementById('ci-open');

  nameEl.textContent = owner + ' / ' + repo;
  openEl.href        = `https://github.com/${owner}/${repo}/actions`;

  /* Show a single shimmer row while the fetch is in flight */
  rowsEl.innerHTML =
    `<div class="ci-row">
       <div class="ci-dot"></div>
       <div class="ci-label shimmer" style="min-width:220px;min-height:13px">&nbsp;</div>
       <div class="ci-status shimmer" style="min-width:60px;min-height:13px">&nbsp;</div>
     </div>`;

  const workflows = cat.workflows || [];
  if (workflows.length === 0) {
    rowsEl.innerHTML =
      '<div class="ci-row"><div class="ci-label">No workflows configured</div></div>';
    return;
  }

  const conclusionMap = {
    success:   ['#4ade80', 'passing'],
    failure:   ['#f87171', 'failing'],
    cancelled: ['#fbbf24', 'cancelled'],
    timed_out: ['#f87171', 'timed out'],
    skipped:   ['#7a8ba8',  'skipped'],
  };

  /* One request per workflow — the specific per-file endpoint works without
     auth for public repos, unlike the general /actions/runs or /actions/workflows
     list endpoints which require a token.                                    */
  rowsEl.innerHTML = '';
  workflows.forEach(wf => {
    const row = document.createElement('div');
    row.className = 'ci-row';
    row.innerHTML =
      `<div class="ci-dot"></div>
       <div class="ci-label">${wf.label}</div>
       <div class="ci-status">Fetching&#8230;</div>
       <div class="ci-time"></div>`;
    rowsEl.appendChild(row);

    const dot    = row.querySelector('.ci-dot');
    const status = row.querySelector('.ci-status');
    const time   = row.querySelector('.ci-time');

    fetch(
      `https://api.github.com/repos/${owner}/${repo}/actions/workflows/${wf.file}/runs?per_page=1`,
      { headers: { 'Accept': 'application/vnd.github+json' } }
    )
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(data => {
        const run = (data.workflow_runs || [])[0];
        if (run) {
          const [color, label] = conclusionMap[run.conclusion]
            || ['#7a8ba8', run.conclusion || run.status || 'unknown'];
          dot.style.background = color;
          status.textContent   = label;
          status.style.color   = color;
          time.textContent     = relTime(new Date(run.updated_at));
        } else {
          status.textContent = 'no runs found';
        }
      })
      .catch(err => {
        dot.style.background = 'var(--border)';
        status.textContent   = 'unavailable (' + err.message + ')';
      });
  });
}

(function init() {
  initTheme();          /* 1 */
  applyLandingTitle();  /* 2 */
  buildProjectTabs();   /* 3 */
  buildCIOverview();    /* 4 — builds table and kicks off live status fetches */
  loadFromHash();       /* 5 */
})();

</script>
